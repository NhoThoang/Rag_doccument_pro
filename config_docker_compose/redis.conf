# redis.conf — cấu hình tối ưu cho tải cao

# Cho phép ghi AOF để đảm bảo an toàn
appendonly yes
appendfsync everysec

# Sử dụng RDB snapshot định kỳ
save 900 1
save 300 10
save 60 10000

# Tăng số lượng kết nối tối đa
maxclients 10000

# Tăng backlog queue (khi nhiều request đến cùng lúc)
tcp-backlog 1024

# Giảm timeout idle connection
timeout 300

# Bật tính năng nén dữ liệu khi lưu (giảm RAM)
rdbcompression yes

# Giảm độ trễ disk I/O
no-appendfsync-on-rewrite yes

# Cải thiện hiệu năng mạng
tcp-keepalive 60

# Giới hạn RAM (nếu Redis được dùng làm cache)
maxmemory 2gb
maxmemory-policy allkeys-lru

# Cho phép cluster hoặc replica sau này
protected-mode no
