log_level: WARN

service:
  grpc_port: 6334
  http_port: 6333
  max_request_size_mb: 256
  enable_cors: true

storage:
  storage_path: /qdrant/storage
  on_disk_payload: true             # ✅ Lưu metadata xuống disk thay vì RAM
  optimize_on_error: true
  snapshots_path: /qdrant/storage/snapshots
  wal:
    wal_capacity_mb: 256            # Write-Ahead Log tối đa 256MB
    wal_segments_ahead: 2
  optimizer_threshold_kb: 100000    # Chỉ optimize khi có thay đổi lớn

cluster:
  enabled: false                    # ⚙️ Có thể bật nếu scale nhiều node
  p2p:
    port: 6335

performance:
  max_search_threads: 8             # ✅ Cho phép xử lý song song query
  query_parallel: true              # ✅ Bật xử lý song song trong search
  quantization:
    always_ram: true                # Giữ vector quantized trong RAM
  mmap_threshold_kb: 8192           # Dữ liệu nhỏ hơn 8MB sẽ load lên RAM
  search_timeout_sec: 10

optimizers:
  indexing_threshold_kb: 100000     # Chỉ rebuild index khi dữ liệu thay đổi nhiều
  memmap_threshold_kb: 10000
  default_segment_number: 2
  deleted_threshold: 0.2            # Merge khi 20% vectors bị xóa

telemetry:
  disabled: true

